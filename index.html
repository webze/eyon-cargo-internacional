<html lang="es">

    <meta charset="UTF-8" />

    <title>EYON Cargo Internacional</title>
    <script>
      (function () {
        try {
          var currentFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function () {
              return currentFetch;
            },
            set: function (val) {
              currentFetch = val;
            },
            configurable: true,
            enumerable: true,
          });
        } catch (e) {
          // Ignore if re-definition is not allowed
        }
      })();
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
